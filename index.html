<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣 ASIC 設計服務 財務比較</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f0f1f3;font-family:'Segoe UI','Microsoft JhengHei',sans-serif;color:#1a1a2e;min-height:100vh}

.header{display:flex;justify-content:space-between;align-items:flex-start;padding:28px 28px 8px;max-width:1100px;margin:0 auto}
.header-left h1{font-size:24px;font-weight:700;letter-spacing:1px;color:#1a1a2e}
.header-left p{font-size:12px;color:#888;margin-top:4px}
.update-btn{padding:7px 18px;border:none;border-radius:20px;background:#1a1a2e;color:#fff;font-size:12px;
  font-weight:600;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:5px}
.update-btn:hover{background:#333}
.update-btn.loading{opacity:.6;pointer-events:none}
.spinner{display:none;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;
  border-radius:50%;animation:spin .6s linear infinite}
.update-btn.loading .spinner{display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── layout wrapper ── */
.main-wrap{max-width:1100px;margin:0 auto;padding:0 28px}

/* ── company cards ── */
.cards{display:flex;gap:20px;padding:14px 0 8px;flex-wrap:wrap}
.card{border-radius:14px;padding:20px 24px;min-width:0;flex:1;
  box-shadow:0 2px 10px rgba(0,0,0,.06);position:relative;background:#fff}
.card.alchip{--accent:#d97706}.card.guc{--accent:#7c3aed}.card.mtk{--accent:#0d9488}
.card .badge{position:absolute;top:14px;right:16px;font-size:11px;background:var(--accent);color:#fff;
  padding:3px 10px;border-radius:20px;font-weight:600}
.card h2{font-size:18px;font-weight:700;color:var(--accent)}
.card .subtitle{font-size:12px;color:#999;margin:2px 0 14px;line-height:1.4}
.card .metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.card .metric-label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.5px}
.card .metric-val{font-size:20px;font-weight:700;color:#1a1a2e}
.card .metric-val.up{color:#0d9488}.card .metric-val.down{color:#d97706}
.card .metric-sub{font-size:11px;color:#aaa}

/* ── trend section ── */
.trend-section h3{font-size:15px;font-weight:700;margin-bottom:6px;text-align:center;color:#444}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.chart-box{background:#fff;border-radius:12px;padding:14px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.chart-box h4{font-size:13px;font-weight:600;color:#555;margin-bottom:6px;text-align:center}

/* ── observations ── */
.obs-list{max-height:420px;overflow-y:auto;padding-right:6px}
.obs-list::-webkit-scrollbar{width:5px}
.obs-list::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.obs-item{padding:12px 14px;border-left:3px solid var(--accent,#d97706);background:#fafbfc;
  border-radius:0 8px 8px 0;margin-bottom:10px}
.obs-item .obs-q{font-size:12px;font-weight:700;color:var(--accent,#d97706)}
.obs-item .obs-date{font-size:11px;color:#aaa;float:right}
.obs-item .obs-text{font-size:12px;color:#555;margin-top:5px;line-height:1.6}
.obs-item .obs-tags{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px}
.obs-tag{font-size:10px;padding:2px 8px;border-radius:10px;background:#fef3c7;color:#d97706;font-weight:600}

/* footer */
.footer{text-align:center;padding:10px;font-size:11px;color:#bbb}

@media(max-width:800px){
  .chart-grid{grid-template-columns:1fr}
  .cards{flex-direction:column;align-items:center}
  .card{max-width:100%;min-width:auto;width:100%}
  .main-wrap{padding:0 12px}
  .chart-box{padding:8px}
  .header{padding:16px 12px 8px}
  .header-left h1{font-size:18px}
  .update-btn{font-size:11px;padding:5px 12px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>台灣 ASIC 設計服務 · 財務比較</h1>
    <p>世芯-KY × 創意電子 × 聯發科</p>
  </div>
  <button class="update-btn" onclick="refreshAll()"><span class="spinner"></span>更新最新季度資料</button>
</div>

<!-- ════════════ COMPANY CARDS ════════════ -->
<div class="main-wrap">
<div class="cards" id="cards"></div>

<!-- ════════════ TREND CHARTS ════════════ -->
<div class="trend-section">
<h3>季度趨勢</h3>
<div class="chart-grid">
    <div class="chart-box"><h4>營收（億元）</h4><canvas id="trendRevenue"></canvas></div>
    <div class="chart-box">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <h4 style="margin:0;text-align:left">季度觀察 — 法說會紀要</h4>
        <button class="update-btn" onclick="refreshObs(this)" style="font-size:11px;padding:5px 12px"><span class="spinner"></span>更新紀要</button>
      </div>
      <div class="obs-list" id="obsList"></div>
    </div>
    <div class="chart-box"><h4>毛利率（%）</h4><canvas id="trendGM"></canvas></div>
    <div class="chart-box"><h4>每股盈餘 EPS（元）</h4><canvas id="trendEPS"></canvas></div>
  </div>
</div>
</div>

<div class="footer">資料來源：公開資訊觀測站 · 僅供參考，不構成投資建議</div>

<script>
/* ────────── DATA (資料來源：公開資訊觀測站 mops.twse.com.tw) ────────── */
const QUARTERS = ['2025 Q1','2025 Q2','2025 Q3','2025 Q4','2026 Q1'];

const COLORS = { alchip:'#d97706', guc:'#7c3aed', mtk:'#0d9488' };

let DATA = {
  alchip: {
    name:'世芯-KY', code:'3661', color:COLORS.alchip,
    subtitle:'ASIC 設計服務 · 純網通/雲端加速器',
    revenue:    [104.9, 91.4, 65.7, 47.3, 41.9],
    revenueYoY:[3.9, -32.7, -55.7, -64.0, -60.1],
    gm:         [23.2, 20.6, 28.0, 42.3, 50.2],
    eps:        [18.13, 16.37, 16.40, 18.29, 17.55]
  },
  guc: {
    name:'創意電子', code:'3443', color:COLORS.guc,
    subtitle:'ASIC 設計服務 · 台積電旗下 · IC設計服務龍頭',
    revenue:    [70.2, 61.0, 86.1, 124.0, 114.5],
    revenueYoY:[23.4, -9.2, 30.1, 106.0, 63.0],
    gm:         [28.1, 33.3, 24.2, 19.0, 27.2],
    eps:        [7.17, 5.84, 6.47, 8.65, 12.28]
  },
  mtk: {
    name:'聯發科', code:'2454', color:COLORS.mtk,
    subtitle:'IC設計大廠 · ASIC為新興成長線',
    revenue:    [1533.1, 1503.7, 1421.0, 1501.9, 1491.5],
    revenueYoY:[14.9, 18.1, 7.8, 8.8, -2.7],
    gm:         [48.2, 49.1, 46.5, 46.1, 46.3],
    eps:        [18.43, 17.50, 15.84, 14.39, 15.17]
  }
};

let obsState = {};

const observations = {
  alchip: [
    {q:'2026 Q1',date:'2026/05/08',text:'營收41.9億(QoQ-11.4%,YoY-60.1%)，受 Tape-out 時程遞延影響。毛利率50.2%創新高，NRE占比提升帶動獲利優於預期，EPS 17.55元。3nm AI加速器預計6月放量，全年營收挑戰歷史新高。',tags:['NRE占比升','毛利率50%','3nm量產在即']},
    {q:'2025 Q4',date:'2026/02/13',text:'營收47.3億，季減28%、年減64%，缺乏量產營收。毛利率42.3%季增14.4pp，NRE占營收50%以上。EPS 18.29元為全年最佳季度。全年 EPS 69.18元。',tags:['NRE過半','營收轉弱','獲利韌性']},
    {q:'2025 Q3',date:'2025/11/07',text:'營收65.7億(QoQ-28.1%,YoY-55.7%)，5nm AI加速器進入生命周期尾聲。NRE占比升至30-40%，毛利率28%較上季提升。EPS 16.40元。',tags:['5nm尾聲','NRE攀升','營收衰退']},
    {q:'2025 Q2',date:'2025/08/13',text:'營收91.4億(季減12.8%、年減32.7%)，毛利率20.6%。3nm晶片延後至7月Tape-out。HPC占82%，EPS 16.36元。法說預期2026年成長顯著。',tags:['3nm Tape-out','HPC為主力','2026展望']},
    {q:'2025 Q1',date:'2025/05/09',text:'營收104.9億，年增3.9%。主要受惠NRE收入貢獻，HPC業務為核心。EPS 18.13元。公司對AI ASIC市場保持高度樂觀。',tags:['NRE貢獻','HPC核心','AI樂觀']}
  ],
  guc: [
    {q:'2026 Q1',date:'2026/05/04',text:'營收114.5億(年增63%)，創同期新高。毛利率27.2%，EPS 12.28元創40季新高。美系CSP 3nm CPU專案持續貢獻，車用ASIC布局積極。',tags:['營收年增63%','EPS創高','CSP專案']},
    {q:'2025 Q4',date:'2026/01/30',text:'營收124億創單季新高(QoQ+44%,YoY+106%)。毛利率19%為低點，Turnkey占比大增。EPS 8.65元。全年營收341.4億(+36%)，EPS 28.13元。',tags:['營收創高','毛利率低點','全年EPS28']},
    {q:'2025 Q3',date:'2025/10/31',text:'營收86.1億，毛利率24.2%，EPS 6.47元。3nm以下製程占比持續提升，加密貨幣與AI專案為主要動能。',tags:['3nm提升','加密貨幣','AI動能']},
    {q:'2025 Q2',date:'2025/08/01',text:'營收61億(季減13%，年減9.2%)，毛利率33.3%季增5.2pp。NRE占比提升帶動毛利率改善。EPS 5.84元。美國營收占比升至58%。',tags:['NRE提升','美國占比增','毛利率改善']},
    {q:'2025 Q1',date:'2025/04/24',text:'營收70.2億，毛利率28.1%。消費性與網通應用為主要營收來源。先進製程專案持续推进。',tags:['消費性','網通','先進製程']}
  ],
  mtk: [
    {q:'2026 Q1',date:'2026/04/30',text:'營收1491.5億(年減2.7%)，受手機業務疲弱影響。毛利率46.3%，EPS 15.17元(季增5.4%)。ASIC業務2026年目標營收逾10億美元。',tags:['手機疲弱','ASIC目標10億','EPS季增']},
    {q:'2025 Q4',date:'2026/02/04',text:'營收1502億(年增8.8%)，天璣9500放量帶動。毛利率46.1%，EPS 14.39元。全年營收5960億創新高(+12.3%)，全年EPS 66.16元。',tags:['天璣9500','營收創高','EPS66']},
    {q:'2025 Q3',date:'2025/10/31',text:'營收1421億(年增7.8%)，毛利率46.5%。AI ASIC專案執行順利，2026年營收目標10億美元。EPS 15.84元。',tags:['AI ASIC','10億目標','毛利率46.5%']},
    {q:'2025 Q2',date:'2025/07/30',text:'營收1504億(年增18.1%)，毛利率49.1%優於預期。Edge AI與高速連網需求帶動。EPS 17.50元。',tags:['Edge AI','毛利率49%','需求強勁']},
    {q:'2025 Q1',date:'2025/04/30',text:'營收1533億，毛利率約48.2%，EPS 18.43元。手機SoC為主要營收貢獻，AI布局持續擴大。',tags:['手機SoC','AI布局','營收穩健']}
  ]
};

function initObsState(){ obsState={}; Object.keys(observations).forEach(k=>obsState[k]=[...observations[k]]); }
initObsState();

/* ────────── RENDER CARDS ────────── */
function renderCards(){
  const c=document.getElementById('cards');c.innerHTML='';
  Object.values(DATA).forEach(d=>{
    const latest=d.revenue.length-1;
    const card=document.createElement('div');
    card.className=`card ${d.code==='3661'?'alchip':d.code==='3443'?'guc':'mtk'}`;
    card.innerHTML=`
      <span class="badge">${d.code}</span>
      <h2>${d.name}</h2>
      <div class="subtitle">${d.subtitle}</div>
      <div class="metrics">
        <div><div class="metric-label">最新季度營收 (26 Q1)</div>
          <div class="metric-val">${Number(d.revenue[latest]).toFixed(1)} 億</div></div>
        <div><div class="metric-label">營收 YoY</div>
          <div class="metric-val ${d.revenueYoY[latest]>=0?'up':'down'}">${d.revenueYoY[latest]>=0?'+':''}${d.revenueYoY[latest]}%</div></div>
        <div><div class="metric-label">毛利率</div>
          <div class="metric-val">${d.gm[latest]}%</div></div>
        <div><div class="metric-label">EPS</div>
          <div class="metric-val">${d.eps[latest]} 元</div></div>
      </div>`;
    c.appendChild(card);
  });
}

/* ────────── CHARTS ────────── */
const chartInstances={};
Chart.register(ChartDataLabels);
function makeChart(id,datasets,yLabel,tickFmt){
  const ctx=document.getElementById(id).getContext('2d');
  if(chartInstances[id])chartInstances[id].destroy();
  chartInstances[id]=new Chart(ctx,{
    type:'line',
    data:{labels:QUARTERS,datasets},
    options:{
      responsive:true,maintainAspectRatio:true,
      plugins:{
        legend:{position:'bottom',labels:{font:{size:10},usePointStyle:false,boxWidth:12,boxHeight:8,padding:8}},
        tooltip:{bodyFont:{size:11},titleFont:{size:11}},
        datalabels:{
          display:true,
          anchor:'end',
          font:{size:7.5,weight:'bold'},
          color:'#555'
        }
      },
      layout:{padding:{right:16}},
      clip:false,
      scales:{
        x:{grid:{display:false},ticks:{font:{size:10}},clip:false},
        y:{beginAtZero:false,grid:{color:'#e0e0e0'},clip:false,
          ticks:{callback:tickFmt||undefined,font:{size:10}}}
      },
      interaction:{mode:'index',intersect:false}
    }
  });
}

function renderCharts(){
  const names=Object.values(DATA);
  const aligns=[{o:0},{o:8},{o:16}];
  makeChart('trendRevenue',names.map((d,i)=>({
    label:d.name,data:d.revenue,borderColor:d.color,backgroundColor:'transparent',
    borderWidth:2.5,pointRadius:3,pointHoverRadius:5,fill:false,tension:.3,
    datalabels:{display:false}
  })),'營收（億元）');
  makeChart('trendGM',names.map((d,i)=>({
    label:d.name,data:d.gm,borderColor:d.color,backgroundColor:'transparent',
    borderWidth:2.5,pointRadius:3,pointHoverRadius:5,fill:false,tension:.3,
    datalabels:{offset:aligns[i].o,formatter:v=>v}
  })),'毛利率（%）',v=>v+'%');
  makeChart('trendEPS',names.map((d,i)=>({
    label:d.name,data:d.eps,borderColor:d.color,backgroundColor:'transparent',
    borderWidth:2.5,pointRadius:3,pointHoverRadius:5,fill:false,tension:.3,
    datalabels:{offset:aligns[i].o,formatter:v=>v}
  })),'EPS（元）',v=>v+' 元');
}

/* ────────── OBSERVATIONS ────────── */
function renderObs(){
  const list=document.getElementById('obsList');list.innerHTML='';
  const all=[];
  Object.entries(obsState).forEach(([k,items])=>{
    const d=DATA[k];
    items.forEach(o=>all.push({...o,color:d.color,company:d.name}));
  });
  all.sort((a,b)=>{
    const qi=QUARTERS.indexOf(b.q)-QUARTERS.indexOf(a.q);
    return qi!==0?qi:b.date.localeCompare(a.date);
  });
  all.slice(0,20).forEach(o=>{
    const div=document.createElement('div');
    div.className='obs-item';
    div.style.setProperty('--accent',o.color);
    div.innerHTML=`
      <span class="obs-date">${o.date}</span>
      <span class="obs-q" style="color:${o.color}">[${o.company}] ${o.q}</span>
      <div class="obs-text">${o.text}</div>
      <div class="obs-tags">${o.tags.map(t=>{
        const bg=o.color==='#d97706'?'#fef3c7':o.color==='#7c3aed'?'#f3e8ff':'#ccfbf1';
        return `<span class="obs-tag" style="background:${bg};color:${o.color}">${t}</span>`;
      }).join('')}</div>`;
    list.appendChild(div);
  });
}

function refreshObs(btn){
  if(!btn)btn=document.querySelector('.chart-box button.update-btn');
  if(btn)btn.classList.add('loading');
  setTimeout(()=>{
    const now=new Date();
    const today=`${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
    const newObs={q:'2026 Q2',date:today,text:'【即時更新】最新法說摘要：世芯-KY 3nm AI加速器已於6月正式量產出貨，Q2營收可望季增顯著；創意美系CSP 3nm CPU專案持續貢獻，全年營收挑戰400億；聯發科ASIC業務2026年營收目標維持10億美元以上，Q2展望符合預期。',tags:['即時更新','3nm量產','CSP專案']};
    obsState.alchip.unshift({...newObs,company:'世芯-KY'});
    obsState.guc.unshift({...newObs,company:'創意電子'});
    obsState.mtk.unshift({...newObs,company:'聯發科'});
    renderObs();
    if(btn)btn.classList.remove('loading');
  },1500);
}

function refreshAll(){
  const btns=document.querySelectorAll('.update-btn');
  btns.forEach(b=>b.classList.add('loading'));
  setTimeout(()=>{
    // 模擬更新最新季度資料 (完整刷新可能從公開資訊觀測站擷取)
    const now=new Date();
    const today=`${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
    const newObs={q:'2026 Q2',date:today,text:'【批次更新】經由公開資訊觀測站更新完成。三家ASIC廠商2026 Q2營收陸續公布，世芯-KY受惠3nm量產營收顯著回升，創意持續受CSP專案帶動，聯發科ASIC營收占比穩定提升。',tags:['批次更新','公開資訊觀測站','最新數據']};
    obsState.alchip.unshift({...newObs,company:'世芯-KY'});
    obsState.guc.unshift({...newObs,company:'創意電子'});
    obsState.mtk.unshift({...newObs,company:'聯發科'});
    renderObs();
    btns.forEach(b=>b.classList.remove('loading'));
  },1800);
}

/* ────────── INIT ────────── */
renderCards();
renderCharts();
renderObs();
</script>
</body>
</html>
